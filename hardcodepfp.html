<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍄 Eggward's Guestbook</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --mario-red: #E52521;
      --mario-blue: #1B69E0;
      --mario-yellow: #FBD000;
      --mario-green: #43A047;
      --mario-brown: #8B4513;
      --brick: #C84B31;
      --sky: #5C94FC;
      --ground: #E77B20;
      --cloud: #fff;
      --coin: #FFD700;
      --pipe: #008000;
      --pipe-dark: #005700;
      --text-dark: #1a0a00;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Press Start 2P', monospace;
      background-color: var(--sky);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Scrolling sky background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80px 40px at 10% 20%, white 100%, transparent 100%),
        radial-gradient(ellipse 120px 50px at 15% 20%, white 100%, transparent 100%),
        radial-gradient(ellipse 80px 40px at 60% 15%, white 100%, transparent 100%),
        radial-gradient(ellipse 100px 45px at 65% 15%, white 100%, transparent 100%),
        radial-gradient(ellipse 70px 35px at 80% 25%, white 100%, transparent 100%),
        radial-gradient(ellipse 110px 45px at 85% 25%, white 100%, transparent 100%);
      z-index: 0;
      animation: clouds 20s linear infinite;
    }

    @keyframes clouds {
      0% { background-position: 0 0; }
      100% { background-position: 1000px 0; }
    }

    /* Ground strip */
    .ground {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 64px;
      z-index: 1;
      background: repeating-linear-gradient(
        90deg,
        var(--ground) 0px, var(--ground) 32px,
        #c9690c 32px, #c9690c 64px
      );
      border-top: 4px solid #fff4;
      box-shadow: inset 0 8px 0 #f4a03088;
    }
    .ground::after {
      content: '';
      position: absolute;
      top: -16px;
      left: 0;
      width: 100%;
      height: 16px;
      background: repeating-linear-gradient(
        90deg,
        var(--ground) 0px, var(--ground) 32px,
        #c9690c 32px, #c9690c 64px
      );
    }

    /* Pipes on ground */
    .pipe {
      position: fixed;
      bottom: 64px;
      width: 64px;
      z-index: 2;
    }
    .pipe-shaft {
      height: 80px;
      background: var(--pipe);
      border-left: 6px solid #00aa00;
      border-right: 6px solid var(--pipe-dark);
    }
    .pipe-head {
      height: 24px;
      width: 80px;
      margin-left: -8px;
      background: var(--pipe);
      border-left: 6px solid #00aa00;
      border-right: 6px solid var(--pipe-dark);
      border-top: 6px solid #00cc00;
      border-radius: 4px 4px 0 0;
    }
    .pipe-left { left: 5%; }
    .pipe-right { right: 5%; }

    /* ? blocks in header area */
    .question-block {
      display: inline-block;
      width: 40px;
      height: 40px;
      background: var(--mario-yellow);
      border: 3px solid var(--text-dark);
      border-right-color: #a07800;
      border-bottom-color: #a07800;
      color: var(--text-dark);
      font-family: 'Press Start 2P', monospace;
      font-size: 18px;
      line-height: 34px;
      text-align: center;
      box-shadow: 3px 3px 0 #a07800;
      image-rendering: pixelated;
      cursor: pointer;
      transition: transform 0.1s;
      user-select: none;
    }
    .question-block:active { transform: translateY(2px); box-shadow: 1px 1px 0 #a07800; }

    /* Brick row decoration */
    .brick-row {
      display: flex;
      gap: 0;
      justify-content: center;
      margin: 8px 0;
    }
    .brick {
      width: 32px;
      height: 24px;
      background: var(--brick);
      border: 2px solid #5a1a00;
      border-right-color: #3a0a00;
      border-bottom-color: #3a0a00;
      box-shadow: inset 1px 1px 0 #e07050;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 16px 120px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 32px;
      animation: drop-in 0.6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes drop-in {
      from { transform: translateY(-60px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: clamp(14px, 3vw, 22px);
      color: var(--mario-red);
      text-shadow:
        3px 3px 0 var(--text-dark),
        -1px -1px 0 var(--text-dark),
        1px -1px 0 var(--text-dark),
        -1px 1px 0 var(--text-dark);
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 8px;
      color: var(--white);
      text-shadow: 2px 2px 0 var(--text-dark);
      margin-top: 8px;
    }

    /* Panel */
    .panel {
      background: var(--mario-blue);
      border: 4px solid var(--text-dark);
      border-radius: 4px;
      box-shadow: 6px 6px 0 var(--text-dark);
      padding: 24px;
      margin-bottom: 24px;
      animation: slide-up 0.5s cubic-bezier(.22,1,.36,1) 0.2s both;
    }
    @keyframes slide-up {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .panel-title {
      font-size: 10px;
      color: var(--mario-yellow);
      text-shadow: 2px 2px 0 var(--text-dark);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    label {
      display: block;
      font-size: 7px;
      color: var(--white);
      text-shadow: 1px 1px 0 var(--text-dark);
      margin-bottom: 6px;
      margin-top: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 10px 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      background: var(--white);
      border: 3px solid var(--text-dark);
      border-right-color: #666;
      border-bottom-color: #666;
      box-shadow: inset 2px 2px 0 #ccc;
      color: var(--text-dark);
      outline: none;
      resize: vertical;
    }

    input:focus, textarea:focus {
      border-color: var(--mario-yellow);
      box-shadow: inset 2px 2px 0 #ccc, 0 0 0 2px var(--mario-yellow);
    }

    .btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px 24px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      background: var(--mario-green);
      color: var(--white);
      border: 4px solid var(--text-dark);
      border-right-color: #2d5a2f;
      border-bottom-color: #2d5a2f;
      box-shadow: 4px 4px 0 var(--text-dark);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      text-shadow: 2px 2px 0 var(--text-dark);
    }

    .btn:hover { background: #52b356; }
    .btn:active { transform: translateY(2px); box-shadow: 2px 2px 0 var(--text-dark); }
    .btn:disabled {
      background: #999;
      cursor: not-allowed;
      opacity: 0.7;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--mario-yellow);
      color: var(--text-dark);
      padding: 12px 24px;
      border: 3px solid var(--text-dark);
      box-shadow: 4px 4px 0 var(--text-dark);
      font-size: 8px;
      z-index: 9999;
      opacity: 0;
      transition: all 0.3s cubic-bezier(.22,1,.36,1);
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Star animation */
    .star {
      position: fixed;
      font-size: 32px;
      pointer-events: none;
      z-index: 9998;
      animation: star-rise 1s ease-out forwards;
    }
    @keyframes star-rise {
      0%   { transform: translateY(0) scale(0); opacity: 1; }
      100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
    }

    /* HUD */
    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 7px;
      color: var(--white);
      text-shadow: 2px 2px 0 var(--text-dark);
      z-index: 100;
      gap: 24px;
      flex-wrap: wrap;
    }
    .hud span { display: flex; align-items: center; gap: 6px; }

    .coin-icon {
      display: inline-block;
      width: 12px;
      height: 12px;
      background: var(--coin);
      border-radius: 50%;
      border: 2px solid #d4a000;
      box-shadow: inset -1px -1px 0 #d4a000;
    }

    .coin-counter {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 8px;
      color: var(--white);
      text-shadow: 2px 2px 0 var(--text-dark);
      margin-bottom: 16px;
    }

    /* Character selector */
    .char-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 8px;
    }
    .char-btn {
      background: var(--white);
      border: 3px solid var(--text-dark);
      padding: 8px 4px;
      text-align: center;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.1s, background 0.1s;
      box-shadow: 2px 2px 0 var(--text-dark);
    }
    .char-btn:hover { background: var(--mario-yellow); }
    .char-btn.selected { background: var(--mario-yellow); border-color: var(--mario-red); transform: scale(1.08); }
    .char-label { font-size: 5px; font-family: 'Press Start 2P', monospace; display: block; margin-top: 4px; color: var(--text-dark); }

    /* Entries */
    .entries-header {
      background: var(--brick);
      border: 4px solid var(--text-dark);
      border-radius: 4px 4px 0 0;
      padding: 16px;
      margin-bottom: 0;
    }
    .entries-title {
      font-size: 10px;
      color: var(--white);
      text-shadow: 2px 2px 0 var(--text-dark);
      text-align: center;
    }

    #entries-list {
      background: var(--white);
      border: 4px solid var(--text-dark);
      border-top: none;
      border-radius: 0 0 4px 4px;
      padding: 16px;
      min-height: 100px;
    }

    .entry-card {
      background: #fffef5;
      border: 3px solid var(--text-dark);
      border-radius: 4px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 3px 3px 0 #ddd;
      animation: entry-appear 0.4s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes entry-appear {
      from { transform: translateX(-20px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }

    .entry-name {
      font-size: 9px;
      color: var(--mario-red);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .entry-msg {
      font-size: 7px;
      color: var(--text-dark);
      line-height: 1.6;
      margin-bottom: 10px;
      font-family: 'Press Start 2P', monospace;
    }

    .entry-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 6px;
      color: #666;
    }
    .entry-meta span { display: flex; align-items: center; gap: 4px; }
    .entry-character { color: var(--mario-blue); font-weight: bold; }

    .empty-state {
      text-align: center;
      color: #999;
      font-size: 8px;
      padding: 40px 20px;
      line-height: 1.8;
    }

    .loading {
      text-align: center;
      color: var(--mario-blue);
      font-size: 8px;
      padding: 20px;
    }

    @media (max-width: 480px) {
      h1 { font-size: 13px; }
      .hud { font-size: 6px; gap: 16px; }
      .char-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<!-- HUD -->
<div class="hud">
  <span>🍄 MARIO GUESTBOOK</span>
  <span><span class="coin-icon"></span> <span id="hud-coins">0</span>×</span>
  <span>WORLD 1-1</span>
</div>

<!-- Ground & Pipes -->
<div class="ground"></div>
<div class="pipe pipe-left">
  <div class="pipe-head"></div>
  <div class="pipe-shaft"></div>
</div>
<div class="pipe pipe-right">
  <div class="pipe-head"></div>
  <div class="pipe-shaft"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast">⭐ ENTRY SAVED!</div>

<!-- Main -->
<div class="container">
  <!-- Header -->
  <header>
    <div class="logo-row">
      <span style="font-size:40px">🍄</span>
      <div>
        <h1>MARIO'S<br>GUESTBOOK</h1>
        <div class="subtitle">▶ SIGN IN &amp; JOIN THE ADVENTURE! ◀</div>
      </div>
      <span style="font-size:40px">⭐</span>
    </div>
    <div class="brick-row" aria-hidden="true">
      <div class="question-block" onclick="spawnStar(this)" title="Hit me!">?</div>
      <div class="brick"></div>
      <div class="brick"></div>
      <div class="question-block" onclick="spawnStar(this)" title="Hit me!">?</div>
      <div class="brick"></div>
      <div class="question-block" onclick="spawnStar(this)" title="Hit me!">?</div>
      <div class="brick"></div>
      <div class="brick"></div>
      <div class="question-block" onclick="spawnStar(this)" title="Hit me!">?</div>
    </div>
  </header>

  <!-- Form Panel -->
  <div class="panel">
    <div class="panel-title">✉ SIGN THE GUESTBOOK</div>

    <div class="coin-counter">
      <span class="coin-icon"></span>
      <span id="entry-count">0</span> ADVENTURERS SIGNED
    </div>

    <form id="guestbook-form" onsubmit="handleSubmit(event)">
      <label for="name">YOUR NAME:</label>
      <input id="name" type="text" placeholder="e.g. MARIO, LUIGI..." maxlength="40" required />

      <label>CHOOSE YOUR CHARACTER:</label>
      <div class="char-grid" id="char-grid">
        <button type="button" class="char-btn selected" data-char="🍄" onclick="selectChar(this)">🍄<span class="char-label">MARIO</span></button>
        <button type="button" class="char-btn" data-char="👾" onclick="selectChar(this)">👾<span class="char-label">LUIGI</span></button>
        <button type="button" class="char-btn" data-char="👸" onclick="selectChar(this)">👸<span class="char-label">PEACH</span></button>
        <button type="button" class="char-btn" data-char="🐢" onclick="selectChar(this)">🐢<span class="char-label">KOOPA</span></button>
        <button type="button" class="char-btn" data-char="⭐" onclick="selectChar(this)">⭐<span class="char-label">STAR</span></button>
        <button type="button" class="char-btn" data-char="🌸" onclick="selectChar(this)">🌸<span class="char-label">DAISY</span></button>
        <button type="button" class="char-btn" data-char="🦖" onclick="selectChar(this)">🦖<span class="char-label">BOWSER</span></button>
        <button type="button" class="char-btn" data-char="👻" onclick="selectChar(this)">👻<span class="char-label">BOO</span></button>
      </div>

      <label for="country">WHERE U FROM:</label>
      <input id="country" type="text" placeholder="e.g. Mushroom Kingdom" maxlength="40" />

      <label for="message">YOUR MESSAGE:</label>
      <textarea id="message" rows="4" placeholder="Leave a message for the next adventurer..." maxlength="300" required></textarea>

      <button type="submit" class="btn" id="submit-btn">▶ SUBMIT ENTRY ◀</button>
    </form>
  </div>

  <!-- Entries list -->
  <div>
    <div class="entries-header">
      <div class="entries-title">📜 ADVENTURER LOG</div>
    </div>
    <div id="entries-list">
      <div class="loading">LOADING ENTRIES..</div>
    </div>
  </div>
</div>

<!-- Supabase JS Client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // ═══════════════════════════════════════════════════════════════════════════
  // SUPABASE CONFIGURATION
  // ═══════════════════════════════════════════════════════════════════════════
  // 🔧 REPLACE THESE WITH YOUR SUPABASE PROJECT CREDENTIALS
  const SUPABASE_URL = 'https://xbjvehqqvuhguigzciku.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhianZlaHFxdnVoZ3VpZ3pjaWt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNTIzMzksImV4cCI6MjA4NjkyODMzOX0.nhgtJh96EeaXBBNX1ARoNS_jpg6RVqkm7k8sVRHUwxM';

  // Initialize Supabase client
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ═══════════════════════════════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════════════════════════════
  let selectedChar = '🍄';
  let coins = parseInt(localStorage.getItem('mario_coins') || '0');

  // ═══════════════════════════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════════════════════════
  loadEntries();
  updateHud();

  // ═══════════════════════════════════════════════════════════════════════════
  // SUPABASE FUNCTIONS
  // ═══════════════════════════════════════════════════════════════════════════
  
  /**
   * Load all guestbook entries from Supabase
   */
  async function loadEntries() {
    try {
      const { data, error } = await supabase
        .from('guestbook')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) throw error;

      renderEntries(data || []);
    } catch (error) {
      console.error('Error loading entries:', error);
      document.getElementById('entries-list').innerHTML = 
        '<div class="empty-state">ERROR LOADING ENTRIES<br>CHECK CONSOLE 🔧</div>';
    }
  }

  /**
   * Save a new entry to Supabase
   */
  async function saveEntry(entry) {
    try {
      const { data, error } = await supabase
        .from('guestbook')
        .insert([{
          name: entry.name,
          message: entry.message,
          country: entry.country,
          character: entry.character
        }])
        .select();

      if (error) throw error;

      return data[0];
    } catch (error) {
      console.error('Error saving entry:', error);
      throw error;
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // CHARACTER SELECTION
  // ═══════════════════════════════════════════════════════════════════════════
  function selectChar(btn) {
    document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedChar = btn.dataset.char;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // FORM SUBMIT
  // ═══════════════════════════════════════════════════════════════════════════
  async function handleSubmit(e) {
    e.preventDefault();
    
    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'SAVING...';

    const name = document.getElementById('name').value.trim();
    const message = document.getElementById('message').value.trim();
    const country = document.getElementById('country').value.trim();

    if (!name || !message) {
      submitBtn.disabled = false;
      submitBtn.textContent = '▶ SUBMIT ENTRY ◀';
      return;
    }

    const entry = {
      name,
      message,
      country: country || 'Mushroom Kingdom',
      character: selectedChar
    };

    try {
      await saveEntry(entry);

      // Update coins
      coins++;
      localStorage.setItem('mario_coins', coins);
      updateHud();

      // Reset form
      e.target.reset();
      document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('selected'));
      document.querySelector('.char-btn').classList.add('selected');
      selectedChar = '🍄';

      // Reload entries
      await loadEntries();

      // Show success feedback
      showToast('⭐ 1UP! ENTRY SAVED!');
      spawnStarAt(window.innerWidth / 2, window.innerHeight / 2);

    } catch (error) {
      showToast('❌ ERROR SAVING! TRY AGAIN');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '▶ SUBMIT ENTRY ◀';
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // RENDER ENTRIES
  // ═══════════════════════════════════════════════════════════════════════════
  function renderEntries(entries) {
    const list = document.getElementById('entries-list');
    document.getElementById('entry-count').textContent = entries.length;

    if (entries.length === 0) {
      list.innerHTML = '<div class="empty-state">NO ENTRIES YET...<br>BE THE FIRST HERO! 🍄</div>';
      return;
    }

    list.innerHTML = entries.map((e, i) => {
      const date = new Date(e.created_at).toLocaleDateString('en-US', { 
        year: 'numeric', 
        month: 'short', 
        day: 'numeric' 
      });

      const characterName = getCharacterName(e.character);

      return `
        <div class="entry-card" style="animation-delay:${i * 0.05}s">
          <div class="entry-name">${e.character} ${escapeHtml(e.name)}</div>
          <div class="entry-msg">"${escapeHtml(e.message)}"</div>
          <div class="entry-meta">
            <span class="entry-character">${characterName}</span>
            <span>🌍 ${escapeHtml(e.country)}</span>
            <span>📅 ${date}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // HELPER FUNCTIONS
  // ═══════════════════════════════════════════════════════════════════════════
  
  function getCharacterName(char) {
    const names = {
      '🍄': 'MARIO',
      '👾': 'LUIGI',
      '👸': 'PEACH',
      '🐢': 'KOOPA',
      '⭐': 'STAR',
      '🌸': 'DAISY',
      '🦖': 'BOWSER',
      '👻': 'BOO'
    };
    return names[char] || 'HERO';
  }

  function updateHud() {
    document.getElementById('hud-coins').textContent = coins;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function spawnStar(el) {
    const rect = el.getBoundingClientRect();
    spawnStarAt(rect.left + rect.width / 2, rect.top);
    el.textContent = '★';
    el.style.background = '#aaa';
    setTimeout(() => { el.textContent = '?'; el.style.background = ''; }, 1500);
    coins++;
    localStorage.setItem('mario_coins', coins);
    updateHud();
  }

  function spawnStarAt(x, y) {
    const star = document.createElement('div');
    star.className = 'star';
    star.textContent = '⭐';
    star.style.left = x + 'px';
    star.style.top = y + 'px';
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 1000);
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
